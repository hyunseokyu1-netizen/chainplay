<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainPlay</title>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ChainPlay">
  <meta property="og:title" content="ChainPlay — YouTube 체인 공유">
  <meta property="og:description" content="YouTube 영상 체인을 받았습니다. 앱에서 열어보세요.">
  <meta property="og:image" content="https://hyunseokyu1-netizen.github.io/chainplay/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ChainPlay — YouTube 체인 공유">
  <meta name="twitter:description" content="YouTube 영상 체인을 받았습니다. 앱에서 열어보세요.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #03030a;
      border: 1.5px solid #00f0ff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-triangle {
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 12px solid #00d8f0;
      margin-left: 3px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .chain-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .chain-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .chain-count {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .open-btn {
      display: block;
      width: 100%;
      background: #00d8f0;
      color: #0f0f1a;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
    }
    .install-btn {
      display: block;
      width: 100%;
      background: #1e1e3a;
      color: #aaa;
      font-size: 14px;
      font-weight: 600;
      padding: 13px;
      border: 1px solid #3a3a5e;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .install-hint {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 8px;
    }
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .video-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 8px;
      text-decoration: none;
    }
    .video-item:active { opacity: 0.7; }
    .thumb {
      width: 80px;
      height: 45px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #2a2a3e;
    }
    .video-title {
      font-size: 13px;
      color: #ddd;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .num {
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
      width: 18px;
      text-align: right;
    }
    .error-box {
      text-align: center;
      color: #666;
      padding: 60px 0;
    }
    .section-title {
      font-size: 13px;
      color: #666;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon"><div class="logo-triangle"></div></div>
    <span class="logo-text">ChainPlay</span>
  </div>
  <div id="root"></div>

  <script>
    const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.backdev.chainplay';

    function fromBase64(b64) {
      const standard = b64.replace(/-/g, '+').replace(/_/g, '/');
      const padded = standard + '=='.slice((standard.length + 3) % 4);
      const bytes = Uint8Array.from(atob(padded), c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function parseChain(c) {
      try {
        const payload = JSON.parse(fromBase64(c));
        return {
          name: payload.n,
          videos: payload.v.map(v => ({ videoId: v.i, title: v.t })),
        };
      } catch {
        return null;
      }
    }

    function render() {
      const root = document.getElementById('root');
      const params = new URLSearchParams(window.location.search);
      const c = params.get('c');

      if (!c) {
        root.innerHTML = `<div class="error-box"><p>공유 링크가 올바르지 않습니다.</p><p style="font-size:11px;color:#444;margin-top:8px;word-break:break-all;">${location.href}</p></div>`;
        return;
      }

      const chain = parseChain(c);
      if (!chain) {
        root.innerHTML = '<div class="error-box"><p>링크를 읽을 수 없습니다.</p></div>';
        return;
      }

      const deepLink = 'chainplay://import?data=' + encodeURIComponent(c);

      const videoItems = chain.videos.map((v, i) => `
        <a class="video-item" href="https://youtu.be/${v.videoId}" target="_blank" rel="noopener">
          <span class="num">${i + 1}</span>
          <img class="thumb" src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" alt="">
          <span class="video-title">${escapeHtml(v.title)}</span>
        </a>
      `).join('');

      root.innerHTML = `
        <div class="chain-card">
          <div class="chain-name">${escapeHtml(chain.name)}</div>
          <div class="chain-count">영상 ${chain.videos.length}개</div>
          <button class="open-btn" onclick="tryOpenApp('${deepLink}')">앱으로 열기</button>
          <a class="install-btn" href="${PLAY_STORE_URL}" target="_blank" rel="noopener">
            구글 플레이에서 ChainPlay 설치
          </a>
          <p class="install-hint">앱이 설치되어 있으면 "앱으로 열기"를 눌러주세요</p>
        </div>
        <div class="section-title">영상 목록</div>
        <div class="video-list">${videoItems}</div>
      `;
    }

    function tryOpenApp(deepLink) {
      window.location.href = deepLink;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
